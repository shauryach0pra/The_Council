<!DOCTYPE html>
<html lang="en">
<!-- THE COUNCIL - A web app that summons legendary personalities to answer questions -->
<head>
<!-- Meta tags for character encoding and responsive viewport -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Council </title>
<script>document.title = "The Council";</script>

<!-- Google Fonts import for comic book style typography -->
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Boogaloo&family=Permanent+Marker&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  /* CSS Custom Properties (Variables) - Define consistent color scheme and design tokens */
  :root {
    --yellow: #FFE600;
    --red: #FF3333;
    --blue: #2B7FFF;
    --green: #1DB954;
    --orange: #FF8C00;
    --purple: #9B30FF;
    --pink: #FF4FA0;
    --bg: #FFFDE8;
    --ink: #111111;
    --card-radius: 20px;
  }

  /* Global reset - Remove default margins and padding */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Main body styles - Comic book aesthetic with dotted background pattern */
  body {
    font-family: 'Comic Neue', 'Comic Sans MS', cursive;
    background-color: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Background pattern overlay - Creates comic book dot pattern effect */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(circle, rgba(0,0,0,0.18) 1.5px, transparent 1.5px),
      radial-gradient(circle, rgba(255,230,0,0.35) 2px, transparent 2px);
    background-size: 14px 14px, 28px 28px;
    background-position: 0 0, 7px 7px;
  }

  /* Main content wrapper - Centers content and provides spacing */
  .main-wrap {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  /* Header section styles */
  .header { text-align: center; margin-bottom: 1.8rem; }

  /* Header badge - Promotional banner at the top */
  .header-badge {
    display: inline-block;
    background: #D946EF;
    color: #111;
    font-family: 'Bangers', cursive;
    letter-spacing: 4px;
    font-size: 0.88rem;
    padding: 5px 22px;
    border-radius: 30px;
    border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    margin-bottom: 1rem;
  }

  /* Main title styling - Large comic book style heading with shadow effects */
  h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(5rem, 15vw, 9.5rem);
    letter-spacing: 10px;
    line-height: 0.88;
    color: #fff;
    -webkit-text-stroke: 4px var(--ink);
    paint-order: stroke fill;
    filter: drop-shadow(10px 10px 0 var(--ink)) drop-shadow(-2px -2px 0 var(--ink));
    margin-bottom: 0.6rem;
    position: relative;
    display: inline-block;
  }

  /* Title wrapper container for positioning the starburst background */
  .title-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 0.5rem;
  }
  /* Starburst background animation - Rotating polygon behind the title */
  .starburst {
    position: absolute;
    inset: -18px;
    background: #0047AB;
    clip-path: polygon(50% 0%,61% 30%,93% 11%,78% 38%,100% 50%,78% 62%,93% 89%,61% 70%,50% 100%,39% 70%,7% 89%,22% 62%,0% 50%,22% 38%,7% 11%,39% 30%);
    z-index: -1;
    animation: starSpin 20s linear infinite;
  }
  /* Keyframe animation for continuous starburst rotation */
  @keyframes starSpin { to { transform: rotate(360deg); } }

  /* Subtitle text - Descriptive text below the main title */
  .header-sub {
    font-family: 'Boogaloo', cursive;
    font-size: 1.25rem;
    color: var(--ink);
    opacity: 0.7;
    margin-top: 1rem;
    letter-spacing: 0.5px;
  }

  /* Question input section - Yellow background container for user input */
  .question-section {
    background: #FFEB3B;
    border: 4px solid var(--ink);
    border-radius: 22px;
    box-shadow: 9px 9px 0 var(--ink);
    padding: 1.8rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  /* Question label text - "Your Question / Opinion :" heading */
  .question-label {
    font-family: 'Bangers', cursive;
    font-size: 1.7rem;
    letter-spacing: 2px;
    margin-bottom: 0.9rem;
    -webkit-text-stroke: 1px var(--ink);
  }
  /* Question textarea input field */
  .question-textarea {
    width: 100%;
    min-height: 90px;
    padding: 0.9rem 1.1rem;
    border: 3px solid var(--ink);
    border-radius: 14px;
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    resize: vertical;
    background: #fff;
    outline: none;
    transition: box-shadow 0.15s;
    line-height: 1.6;
    color: var(--ink);
  }
  /* Focus state for textarea - Adds shadow when user clicks on it */
  .question-textarea:focus { box-shadow: 5px 5px 0 var(--ink); }
  /* Placeholder text styling */
  .question-textarea::placeholder { color: #bbb; font-family: 'Boogaloo', cursive; }

  /* Personality chips container - Shows selected legendary personalities */
  .personalities-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  /* Individual personality chip styling */
  .personality-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #fff;
    border: 2.5px solid var(--ink);
    border-radius: 30px;
    padding: 4px 14px;
    font-family: 'Boogaloo', cursive;
    font-size: 0.9rem;
    box-shadow: 2px 2px 0 var(--ink);
  }

  /* Button row container - Holds the main action buttons */
  .btn-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    align-items: center;
  }
  /* Base button styling - Comic book style with shadow effects */
  .btn {
    font-family: 'Bangers', cursive;
    letter-spacing: 2.5px;
    padding: 0.75rem 1.8rem;
    border: 3.5px solid var(--ink);
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 6px 6px 0 var(--ink);
    text-transform: uppercase;
    outline: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  /* Active state - Button appears pressed down when clicked */
  .btn:active:not(:disabled) { transform: translate(4px,4px); box-shadow: 2px 2px 0 var(--ink); }
  /* Main summon button - Red, large, prominent */
  .btn-summon { background: #FF2222; color: #111; font-size: 1.5rem; flex: 1; min-width: 200px; justify-content: center; }
  .btn-summon:hover:not(:disabled) { background: #cc0000; }
  /* Randomize button - Green, smaller */
  .btn-randomize { background: #00CC66; color: var(--ink); font-size: 1.15rem; }
  .btn-randomize:hover:not(:disabled) { background: #00aa55; }
  /* Disabled state - When API call is in progress */
  .btn:disabled { opacity: 0.42; cursor: not-allowed; }

  /* Error message box - Hidden by default, shown when validation fails */
  .error-box {
    display: none;
    background: #fff0f0;
    border: 3px solid var(--ink);
    border-radius: 14px;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    color: #a00;
    box-shadow: 4px 4px 0 var(--ink);
  }
  /* Show class - Makes error box visible */
  .error-box.show { display: block; }

  /* Loading animation container - Visible by default, animations controlled by state */
  .loading-wrap { text-align: center; padding: 0.5rem 2rem 3rem; opacity: 0.3; transition: opacity 0.3s; }
  .loading-wrap.animating { opacity: 1; }
  /* Loading title text - "SUMMONING..." with pulsing animation */
  .loading-title {
    font-family: 'Bangers', cursive;
    font-size: 2.5rem;
    letter-spacing: 4px;
    color: var(--red);
    -webkit-text-stroke: 1.5px var(--ind);
    animation: pulse 0.9s ease-in-out infinite alternate;
    margin-bottom: 0.3rem;
  }
  /* Loading subtitle text */
  .loading-sub { font-family: 'Boogaloo', cursive; color: #999; font-size: 1.05rem; margin-bottom: 1.8rem; }
  /* SVG animation container */
  .loader-stage { display: flex; justify-content: center; align-items: center; }
  /* SVG dimensions and overflow settings */
  .loader-svg { width: 260px; height: 130px; overflow: visible; }

  /* Orbital dots animation - Static by default, animated when active */
  .orbit-dot { transform-origin: 130px 65px; }
  .loading-wrap.animating .orbit-dot { animation: orbitSpin 1.8s linear infinite; }
  /* Staggered animation delays for each orbit dot */
  .orbit-dot:nth-child(1){ animation-delay: 0s; }
  .orbit-dot:nth-child(2){ animation-delay: -0.45s; }
  .orbit-dot:nth-child(3){ animation-delay: -0.9s; }
  .orbit-dot:nth-child(4){ animation-delay: -1.35s; }
  /* Keyframe animation for 360-degree rotation */
  @keyframes orbitSpin { to { transform: rotate(360deg); } }
  /* Center burst animation - Static by default, pulsing when active */
  .centre-burst { transform-origin: 130px 65px; }
  .loading-wrap.animating .centre-burst { animation: burstPulse 0.7s ease-in-out infinite alternate; }
  /* Keyframe for scaling animation */
  @keyframes burstPulse { from{transform:scale(0.88)} to{transform:scale(1.08)} }
  /* Lightning bolt animations - Static by default, zapping when active */
  .zap-left  { transform-origin: 50px 65px; }
  .zap-right { transform-origin: 210px 65px; }
  .loading-wrap.animating .zap-left  { animation: zapLeft  0.6s ease-in-out infinite alternate; }
  .loading-wrap.animating .zap-right { animation: zapRight 0.6s ease-in-out infinite alternate; }
  /* Keyframes for lightning bolt rotation and scaling */
  @keyframes zapLeft  { from{transform:rotate(-15deg) scale(0.9)} to{transform:rotate(15deg) scale(1.1)} }
  @keyframes zapRight { from{transform:rotate(15deg)  scale(0.9)} to{transform:rotate(-15deg) scale(1.1)} }
  /* Question mark bounce animation - Static by default, bouncing when active */
  .qmark { transform-origin: 130px 65px; }
  .loading-wrap.animating .qmark { animation: qBounce 0.5s ease-in-out infinite alternate; }
  /* Keyframe for vertical bouncing */
  @keyframes qBounce { from{transform:translateY(3px)} to{transform:translateY(-5px)} }

  /* Loading dots container - Animated dots below the SVG */
  .loading-dots { display: flex; justify-content: center; gap: 10px; margin-top: 1.2rem; }
  /* Individual loading dot styling - Static by default, bouncing when active */
  .loading-dots span {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2.5px solid var(--ink);
    display: inline-block;
  }
  .loading-wrap.animating .loading-dots span {
    animation: dotBounce 0.6s ease-in-out infinite alternate;
  }
  /* Color and delay variations for each dot */
  .loading-dots span:nth-child(1){ background:var(--red);    animation-delay:0s; }
  .loading-dots span:nth-child(2){ background:var(--blue);   animation-delay:0.2s; }
  .loading-dots span:nth-child(3){ background:var(--green);  animation-delay:0.4s; }
  .loading-dots span:nth-child(4){ background:var(--purple); animation-delay:0.6s; }
  /* Keyframe for dot bouncing animation */
  @keyframes dotBounce { from{transform:translateY(0) scale(1)} to{transform:translateY(-10px) scale(1.2)} }
  /* Keyframe for pulsing animation used by loading title */
  @keyframes pulse { from{opacity:0.4;transform:scale(0.96)} to{opacity:1;transform:scale(1.05)} }

  /* Council announcement strip - Blue banner that appears when results are ready */
  .council-strip {
    display: none;
    background: #2B7FFF;
    color: var(--ink);
    font-family: 'Bangers', cursive;
    font-size: 1.7rem;
    letter-spacing: 5px;
    text-align: center;
    padding: 0.7rem 1rem;
    border-radius: 14px;
    border: 4px solid var(--ink);
    margin-bottom: 1.5rem;
    box-shadow: 6px 6px 0 var(--ink);
  }
  /* Show class - Makes council strip visible */
  .council-strip.show { display: block; }

  /* Council grid layout - 2-column grid for member cards */
  .council-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.6rem;
  }
  /* Responsive design - Single column on mobile devices */
  @media (max-width: 580px) { .council-grid { grid-template-columns: 1fr; } }

  /* Individual member card styling - Comic book style with shadow */
  .member-card {
    background: #fff;
    border: 4px solid var(--ink);
    border-radius: var(--card-radius);
    overflow: hidden;
    box-shadow: 8px 8px 0 var(--ink);
    animation: cardPop 0.45s cubic-bezier(0.175,0.885,0.32,1.275) both;
    transition: transform 0.18s;
  }
  /* Hover effect - Card lifts and slightly rotates */
  .member-card:hover { transform: translateY(-5px) rotate(0.6deg); }
  /* Card entrance animation - Bouncy appearance effect */
  @keyframes cardPop {
    from { opacity:0; transform:scale(0.3) rotate(-15deg); }
    to   { opacity:1; transform:scale(1) rotate(0deg); }
  }
  /* Staggered animation delays for sequential card appearance */
  .member-card:nth-child(1){animation-delay:0.05s}
  .member-card:nth-child(2){animation-delay:0.14s}
  .member-card:nth-child(3){animation-delay:0.23s}
  .member-card:nth-child(4){animation-delay:0.32s}

  /* Card header section - Contains avatar, name, and archetype */
  .card-header {
    padding: 1.1rem 1.2rem 0.9rem;
    border-bottom: 3px solid var(--ink);
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  /* Avatar emoji container - Circular background for personality emoji */
  .avatar-emoji {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 3.5px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    flex-shrink: 0;
    box-shadow: 3px 3px 0 var(--ink);
  }
  /* Member info container - Name and archetype text */
  .member-info { flex: 1; min-width: 0; }
  /* Member name styling */
  .member-name {
    font-family: 'Bangers', cursive;
    font-size: 1.35rem;
    letter-spacing: 1.5px;
    line-height: 1.1;
    -webkit-text-stroke: 0.5px var(--ink);
  }
  /* Member archetype/subtitle styling */
  .member-archetype {
    font-family: 'Boogaloo', cursive;
    font-size: 0.78rem;
    color: #666;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }
  /* Vibe badge - Small tag showing personality vibe */
  .vibe-badge {
    font-family: 'Boogaloo', cursive;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 2.5px solid var(--ink);
    white-space: nowrap;
    align-self: flex-start;
    flex-shrink: 0;
    margin-top: 2px;
    box-shadow: 2px 2px 0 var(--ink);
  }

  /* Speech bubble container - Holds the personality's response */
  .speech-area { padding: 1rem 1.2rem 1.3rem; }
  /* Speech bubble styling - Comic book style with tail pointer */
  .speech-bubble {
    position: relative;
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 0.9rem 1rem;
    font-family: 'Comic Neue', cursive;
    font-size: 0.93rem;
    font-weight: 700;
    line-height: 1.55;
    color: var(--ink);
    background: #fffbf0;
  }
  /* Speech bubble tail - Left-pointing triangle using CSS borders */
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: 18px; left: -15px;
    width: 0; height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 15px solid var(--ink);
  }
  /* Inner tail - Creates the speech bubble effect with lighter color */
  .speech-bubble::after {
    content: '';
    position: absolute;
    top: 19px; left: -11px;
    width: 0; height: 0;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    border-right: 12px solid #fffbf0;
  }

  /* Theme color variations - Different background colors for each card */
  .theme-0 .card-header { background: #fff0f0; }
  .theme-0 .avatar-emoji { background: #ffd0d0; }
  .theme-0 .vibe-badge   { background: #ffd0d0; }
  .theme-1 .card-header { background: #f0f0ff; }
  .theme-1 .avatar-emoji { background: #d0d0ff; }
  .theme-1 .vibe-badge   { background: #d0d0ff; }
  .theme-2 .card-header { background: #f0fff5; }
  .theme-2 .avatar-emoji { background: #b8f0cc; }
  .theme-2 .vibe-badge   { background: #b8f0cc; }
  .theme-3 .card-header { background: #fffae0; }
  .theme-3 .avatar-emoji { background: #ffe080; }
  .theme-3 .vibe-badge   { background: #ffe080; }

  /* Empty state styling - Shows when no council members are displayed */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: #ccc; }
  /* Empty state emoji styling */
  .empty-emoji { font-size: 5rem; display: block; margin-bottom: 1rem; }
  /* Empty state text styling */
  .empty-text { font-family: 'Bangers', cursive; font-size: 1.7rem; letter-spacing: 2px; }
  /* Empty state subtitle styling */
  .empty-sub { font-family: 'Boogaloo', cursive; font-size: 1.05rem; margin-top: 0.4rem; color: #ddd; }

  /* Footer styling - Bottom section of the page */
  .footer { text-align: center; margin-top: 3rem; font-family: 'Boogaloo', cursive; font-size: 0.9rem; color: #bbb; }

  /* ── Music Indicator Widget ── */
  .music-widget {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 40px;
    padding: 0.45rem 1rem 0.45rem 0.6rem;
    box-shadow: 4px 4px 0 var(--ink);
    font-family: 'Boogaloo', cursive;
    font-size: 0.92rem;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
  }
  .music-widget.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }
  .music-widget-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    background: var(--green);
    flex-shrink: 0;
    animation: musicPulse 1.2s ease-in-out infinite alternate;
  }
  .music-widget.muted .music-widget-dot {
    background: #ccc;
    animation: none;
  }
  @keyframes musicPulse {
    from { transform: scale(0.8); opacity: 0.6; }
    to   { transform: scale(1.3); opacity: 1; }
  }
  .music-label { color: var(--ink); letter-spacing: 0.5px; }
  .music-mute-btn {
    background: none;
    border: 2px solid var(--ink);
    border-radius: 50%;
    width: 26px; height: 26px;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    flex-shrink: 0;
    transition: background 0.15s;
    line-height: 1;
  }
  .music-mute-btn:hover { background: #f0f0f0; }
</style>
</head>
<body>
<!-- Main content wrapper -->
<div class="main-wrap">

  <!-- Header section with title and subtitle -->
  <div class="header">
    <div class="header-badge"> SUMMONING LEGENDS SINCE THE DAWN OF TIME </div>
    <div class="title-wrap">
      <h1>THE COUNCIL</h1>
    </div>
    <p class="header-sub">Ask anything. 4 legendary minds bicker, philosophize, and spectacularly disagree.</p>
  </div>

  <!-- Question input section -->
  <div class="question-section">
    <div class="question-label">🎤 Your Question / Opinion :</div>
    <textarea class="question-textarea" id="questionInput" placeholder="e.g. Should I quit my job and become a goat farmer? Is pineapple on pizza okay? Should I text my ex?"></textarea>
    <!-- Personality chips will be dynamically inserted here -->
    <div class="personalities-row" id="personalityChips"></div>
  </div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button class="btn btn-summon" id="summonBtn" onclick="summonCouncil()">🏛️ SUMMON THE COUNCIL</button>
    <button class="btn btn-randomize" id="randomizeBtn" onclick="randomizePersonalities()">🎲 RANDOMIZE</button>
  </div>

  <!-- Error message container -->
  <div class="error-box" id="errorBox"></div>

  <!-- Loading animation container -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="loader-stage">
      <!-- SVG loading animation with orbiting dots and lightning effects -->
      <svg class="loader-svg" viewBox="0 0 260 130" xmlns="http://www.w3.org/2000/svg">
        <g class="orbit-dot"><circle cx="130" cy="18" r="9" fill="#FF3333" stroke="#111" stroke-width="2.5"/><circle cx="130" cy="18" r="4" fill="#fff" opacity="0.5"/></g>
        <g class="orbit-dot"><circle cx="195" cy="65" r="9" fill="#2B7FFF" stroke="#111" stroke-width="2.5"/><circle cx="195" cy="65" r="4" fill="#fff" opacity="0.5"/></g>
        <g class="orbit-dot"><circle cx="130" cy="112" r="9" fill="#1DB954" stroke="#111" stroke-width="2.5"/><circle cx="130" cy="112" r="4" fill="#fff" opacity="0.5"/></g>
        <g class="orbit-dot"><circle cx="65" cy="65" r="9" fill="#9B30FF" stroke="#111" stroke-width="2.5"/><circle cx="65" cy="65" r="4" fill="#fff" opacity="0.5"/></g>
        <g class="zap-left"><polygon points="48,40 35,68 46,68 38,90 58,58 47,58" fill="#FFE600" stroke="#111" stroke-width="2" stroke-linejoin="round"/></g>
        <g class="zap-right"><polygon points="212,40 199,68 210,68 202,90 222,58 211,58" fill="#FFE600" stroke="#111" stroke-width="2" stroke-linejoin="round"/></g>
        <g class="centre-burst"><polygon points="130,38 136,55 153,48 144,63 162,65 144,67 153,82 136,75 130,92 124,75 107,82 116,67 98,65 116,63 107,48 124,55" fill="#FF3333" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/></g>
      </svg>
    </div>
    <!-- Animated loading dots -->
    <div class="loading-dots"><span></span><span></span><span></span><span></span></div>
  </div>

  <!-- Council announcement strip -->
  <div class="council-strip" id="councilStrip">🔊 THE COUNCIL HAS SPOKEN 🔊</div>

  <!-- Council grid where member cards will be displayed -->
  <div class="council-grid" id="councilGrid">
    <div class="empty-state"></div>
  </div>

</div>

<!-- Floating music indicator widget -->
<div class="music-widget" id="musicWidget">
  <div class="music-widget-dot" id="musicDot"></div>
  <span class="music-label" id="musicLabel">🎵 Ambient</span>
  <button class="music-mute-btn" id="musicMuteBtn" onclick="toggleMute()" title="Mute/Unmute">🔊</button>
</div>

<script>
  // ================================================================

// Array to store currently selected personalities for the council
let currentPersonalities = [];

// Utility function to pick random items from an array
// Parameters: arr (array to pick from), n (number of items to pick)
// Returns: Array with n randomly selected items
function pickRandom(arr, n) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, n);
}

// Randomize the council by selecting 4 random personalities
// Updates currentPersonalities array and refreshes the UI chips
function randomizePersonalities() {
  currentPersonalities = pickRandom(ALL_PERSONALITIES, 4);
  renderChips();
}

// Render personality chips in the UI
// Displays the currently selected personalities as styled chips
function renderChips() {
  document.getElementById('personalityChips').innerHTML =
    currentPersonalities.map(p => `<div class="personality-chip">${p.emoji} ${escHtml(p.name)}</div>`).join('');
}

// Main function to summon the council and get responses
// Validates input, shows loading, calls API, and renders results
async function summonCouncil() {
  // Get user's question from textarea
  const question = document.getElementById('questionInput').value.trim();
  const errorBox = document.getElementById('errorBox');
  errorBox.classList.remove('show');

  // Input validation
  if (!question) { showError('🎤 Please type your question or dilemma first!'); return; }
  if (currentPersonalities.length === 0) { showError('🎲 Click Randomize to pick your legends!'); return; }

  // Show loading state and clear previous results
  setLoading(true);
  document.getElementById('councilStrip').classList.remove('show');
  document.getElementById('councilGrid').innerHTML = '';

  // 🎵 Fire HuggingFace emotion detection immediately (non-blocking)
  // Music starts ~500ms in, well before the 3-5s council response
  classifyMoodHF(question).then(mood => playMood(mood));

  try {
    // Make API call to the backend (fires in parallel with HF above)
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, personalities: currentPersonalities })
    });

    // Handle API errors
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Error ${res.status}`);
    }

    // Process successful response
    const data = await res.json();
    setLoading(false);
    renderCouncil(data.members);
    // Auto-scroll to bottom of page
    setTimeout(() => {
      window.scrollTo({ behavior: 'smooth', top: document.body.scrollHeight });
    }, 100);
  } catch (err) {
    // Handle network or API errors
    setLoading(false);
    showError('😬 ' + (err.message || 'Something went wrong. Try again!'));
  }
}

// Render the council member cards with their responses
// Parameters: members (array of member objects with responses)
function renderCouncil(members) {
  // Show the council announcement strip
  document.getElementById('councilStrip').classList.add('show');
  
  // Generate HTML for each member card and insert into grid
  document.getElementById('councilGrid').innerHTML = members.map((m, i) => `
    <div class="member-card theme-${i % 4}">
      <div class="card-header">
        <div class="avatar-emoji">${m.emoji}</div>
        <div class="member-info">
          <div class="member-name">${escHtml(m.name)}</div>
          <div class="member-archetype">${escHtml(m.archetype)}</div>
        </div>
        <div class="vibe-badge">${escHtml(m.vibe)}</div>
      </div>
      <div class="speech-area">
        <div class="speech-bubble">${escHtml(m.response)}</div>
      </div>
    </div>`).join('');
}

// Control loading state UI
// Parameters: on (boolean) - true to show loading animations, false to show static state
function setLoading(on) {
  const loadingWrap = document.getElementById('loadingWrap');
  loadingWrap.classList.toggle('animating', on);
  document.getElementById('summonBtn').disabled = on;
  document.getElementById('randomizeBtn').disabled = on;
}

// Display error message to user
// Parameters: msg (string) - error message to display
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}

// Escape HTML to prevent XSS attacks
// Converts special characters to HTML entities
// Parameters: str (string) - text to escape
// Returns: Escaped HTML string
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ================================================================
//  🎵 AMBIENT MUSIC ENGINE
// ================================================================

const MOOD_CONFIG = {
  neutral:       { label: '🌿 Calm',        bpm: 58  },
  anxious:       { label: '⚡ Tense',        bpm: 118 },
  sad:           { label: '🌧️ Melancholic',  bpm: 48  },
  romantic:      { label: '💕 Romantic',     bpm: 62  },
  playful:       { label: '🎉 Playful',      bpm: 108 },
  philosophical: { label: '🔮 Cosmic',       bpm: 38  },
  career:        { label: '💼 Focused',      bpm: 82  },
  chaotic:       { label: '🌀 Chaotic',      bpm: 96  },
};

const music = { mood: null, playing: false, muted: false, synths: [], parts: [], effects: [] };

// ── HuggingFace emotion label → music mood ───────────────────────
const HF_TO_MOOD = {
  'joy':      'playful',
  'sadness':  'sad',
  'anger':    'chaotic',
  'fear':     'anxious',
  'disgust':  'chaotic',
  'surprise': 'romantic',
  'neutral':  'neutral',
};

// ── Emotion detection via Worker proxy (HF token never exposed) ──
async function classifyMoodHF(text) {
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emotion_text: text }),
    });
    if (!res.ok) return 'neutral';
    const data = await res.json();
    return HF_TO_MOOD[data.emotion] ?? 'neutral';
  } catch (e) {
    return 'neutral'; // silent fallback
  }
}

// ── Cleanup all active audio nodes ──────────────────────────────
async function cleanupMusic() {
  Tone.Transport.stop();
  Tone.Transport.cancel();
  music.parts.forEach(p  => { try { p.stop(); p.dispose(); } catch(e){} });
  music.synths.forEach(s => { try { s.dispose(); } catch(e){} });
  music.effects.forEach(e => { try { e.dispose(); } catch(e){} });
  music.parts = []; music.synths = []; music.effects = [];
}

// ── Master: detect mood and start playback ───────────────────────
async function playMood(mood) {
  await cleanupMusic();
  await Tone.start();
  music.mood = mood;
  music.playing = true;
  Tone.Transport.bpm.value = MOOD_CONFIG[mood].bpm;

  const reverb = new Tone.Reverb({ decay: 5, wet: 0.55 }).toDestination();
  const delay  = new Tone.FeedbackDelay('8n', 0.25).connect(reverb);
  music.effects.push(reverb, delay);

  const builders = { neutral, anxious, sad, romantic, playful, philosophical, career, chaotic };
  builders[mood](reverb, delay);

  if (!music.muted) Tone.Transport.start();
  updateMusicUI();
}

// ── NEUTRAL — gentle C-major pad ────────────────────────────────
function neutral(reverb) {
  const pad = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 2.5, decay: 1, sustain: 0.7, release: 4 },
    volume: -20,
  }).connect(reverb);
  music.synths.push(pad);

  const chords = [
    { time:'0:0',  notes:['C3','G3','E4'] },
    { time:'4:0',  notes:['A2','E3','C4'] },
    { time:'8:0',  notes:['F2','C3','A3'] },
    { time:'12:0', notes:['G2','D3','B3'] },
  ];
  const part = new Tone.Part((t, v) => pad.triggerAttackRelease(v.notes, '3m', t), chords);
  part.loop = true; part.loopEnd = '16m'; part.start(0);
  music.parts.push(part);
}

// ── ANXIOUS — fast minor arpeggio ───────────────────────────────
function anxious(reverb) {
  const synth = new Tone.Synth({
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 0.4 },
    volume: -22,
  }).connect(reverb);
  music.synths.push(synth);

  const notes = ['E4','G4','B4','E5','D5','B4','G4','F#4','E4','A4','C5','E5','B4','G#4'];
  let i = 0;
  const loop = new Tone.Loop(t => {
    synth.triggerAttackRelease(notes[i % notes.length], '16n', t);
    i++;
  }, '8n');
  loop.start(0);
  music.parts.push(loop);

  // Low rumble
  const lfo = new Tone.Oscillator({ frequency: 55, type: 'sine', volume: -30 }).connect(reverb);
  lfo.start();
  music.synths.push(lfo);
}

// ── SAD — slow A-minor pads ──────────────────────────────────────
function sad(reverb) {
  const pad = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'triangle' },
    envelope: { attack: 3, decay: 2, sustain: 0.6, release: 5 },
    volume: -18,
  }).connect(reverb);
  music.synths.push(pad);

  const chords = [
    { time:'0:0',  notes:['A2','C3','E3'] },
    { time:'6:0',  notes:['F2','A2','C3'] },
    { time:'12:0', notes:['G2','B2','D3'] },
    { time:'18:0', notes:['E2','G2','B2'] },
  ];
  const part = new Tone.Part((t, v) => pad.triggerAttackRelease(v.notes, '5m', t), chords);
  part.loop = true; part.loopEnd = '24m'; part.start(0);
  music.parts.push(part);
}

// ── ROMANTIC — warm slow pads ────────────────────────────────────
function romantic(reverb, delay) {
  const pad = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 2, decay: 1.5, sustain: 0.75, release: 4 },
    volume: -19,
  }).connect(delay);
  music.synths.push(pad);

  const melody = new Tone.Synth({
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.5, decay: 0.5, sustain: 0.6, release: 2 },
    volume: -26,
  }).connect(reverb);
  music.synths.push(melody);

  const chords = [
    { time:'0:0',  notes:['C3','E3','G3','B3'] },
    { time:'4:0',  notes:['A2','C3','E3','G3'] },
    { time:'8:0',  notes:['F2','A2','C3','E3'] },
    { time:'12:0', notes:['G2','B2','D3','F3'] },
  ];
  const melNotes = [
    {time:'0:0',n:'E5'},{time:'2:0',n:'D5'},{time:'4:0',n:'C5'},
    {time:'6:0',n:'A4'},{time:'8:0',n:'C5'},{time:'10:0',n:'B4'},
    {time:'12:0',n:'G4'},{time:'14:0',n:'A4'},
  ];
  const chordPart = new Tone.Part((t, v) => pad.triggerAttackRelease(v.notes, '3m', t), chords);
  chordPart.loop = true; chordPart.loopEnd = '16m'; chordPart.start(0);
  const melPart = new Tone.Part((t, v) => melody.triggerAttackRelease(v.n, '1m', t), melNotes);
  melPart.loop = true; melPart.loopEnd = '16m'; melPart.start(0);
  music.parts.push(chordPart, melPart);
}

// ── PLAYFUL — bouncy C-major ─────────────────────────────────────
function playful(reverb) {
  const synth = new Tone.Synth({
    oscillator: { type: 'square', volume: -8 },
    envelope: { attack: 0.01, decay: 0.15, sustain: 0.4, release: 0.3 },
    volume: -22,
  }).connect(reverb);
  music.synths.push(synth);

  const notes = ['C5','E5','G5','C6','G5','E5','C5','D5','F5','A5','C6','A5','F5','D5'];
  let i = 0;
  const loop = new Tone.Loop(t => {
    synth.triggerAttackRelease(notes[i % notes.length], '8n', t);
    i++;
  }, '4n');
  loop.start(0);
  music.parts.push(loop);

  const bass = new Tone.Synth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.05, decay: 0.2, sustain: 0.3, release: 0.4 },
    volume: -24,
  }).connect(reverb);
  music.synths.push(bass);
  const bassNotes = ['C2','C2','G2','G2','F2','F2','G2','G2'];
  let b = 0;
  const bassLoop = new Tone.Loop(t => {
    bass.triggerAttackRelease(bassNotes[b % bassNotes.length], '4n', t);
    b++;
  }, '2n');
  bassLoop.start(0);
  music.parts.push(bassLoop);
}

// ── PHILOSOPHICAL — cosmic drone ─────────────────────────────────
function philosophical(reverb) {
  const drone = new Tone.Oscillator({ frequency: 'C2', type: 'sine', volume: -28 }).connect(reverb);
  const drone2 = new Tone.Oscillator({ frequency: 'G2', type: 'sine', volume: -32 }).connect(reverb);
  drone.start(); drone2.start();
  music.synths.push(drone, drone2);

  const pad = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 4, decay: 2, sustain: 0.8, release: 6 },
    volume: -22,
  }).connect(reverb);
  music.synths.push(pad);

  const chords = [
    { time:'0:0',  notes:['C3','G3','Bb3','D4'] },
    { time:'8:0',  notes:['Ab2','Eb3','G3','C4'] },
    { time:'16:0', notes:['F2','C3','Eb3','Ab3'] },
    { time:'24:0', notes:['G2','D3','F3','Bb3']  },
  ];
  const part = new Tone.Part((t, v) => pad.triggerAttackRelease(v.notes, '7m', t), chords);
  part.loop = true; part.loopEnd = '32m'; part.start(0);
  music.parts.push(part);
}

// ── CAREER — steady focused pulse ───────────────────────────────
function career(reverb) {
  const synth = new Tone.Synth({
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.05, decay: 0.3, sustain: 0.4, release: 0.6 },
    volume: -24,
  }).connect(reverb);
  music.synths.push(synth);

  const notes = ['C4','E4','G4','B4','A4','F4','D4','G4'];
  let i = 0;
  const loop = new Tone.Loop(t => {
    synth.triggerAttackRelease(notes[i % notes.length], '8n', t);
    i++;
  }, '4n');
  loop.start(0);
  music.parts.push(loop);

  const pad = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 1, decay: 1, sustain: 0.5, release: 2 },
    volume: -28,
  }).connect(reverb);
  music.synths.push(pad);
  const chordPart = new Tone.Part((t, v) => pad.triggerAttackRelease(v.notes, '1m', t), [
    { time:'0:0', notes:['C3','G3'] },
    { time:'2:0', notes:['A2','E3'] },
    { time:'4:0', notes:['F2','C3'] },
    { time:'6:0', notes:['G2','D3'] },
  ]);
  chordPart.loop = true; chordPart.loopEnd = '8m'; chordPart.start(0);
  music.parts.push(chordPart);
}

// ── CHAOTIC — dissonant irregular ───────────────────────────────
function chaotic(reverb, delay) {
  const synth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.05, decay: 0.3, sustain: 0.2, release: 0.8 },
    volume: -24,
  }).connect(delay);
  music.synths.push(synth);

  const clusters = [
    { time:'0:0',  notes:['C#4','G4','Bb4']  },
    { time:'1:2',  notes:['D4','Ab4','B4']   },
    { time:'3:0',  notes:['Eb4','A4','C5']   },
    { time:'4:1',  notes:['E4','Bb4','Db5']  },
    { time:'5:3',  notes:['F4','B4','D5']    },
    { time:'7:0',  notes:['F#4','C5','Eb5']  },
  ];
  const part = new Tone.Part((t, v) => synth.triggerAttackRelease(v.notes, '4n', t), clusters);
  part.loop = true; part.loopEnd = '8m'; part.start(0);
  music.parts.push(part);
}

// ── UI helpers ───────────────────────────────────────────────────
function updateMusicUI() {
  const widget = document.getElementById('musicWidget');
  const label  = document.getElementById('musicLabel');
  const btn    = document.getElementById('musicMuteBtn');
  const dot    = document.getElementById('musicDot');

  if (!music.playing) { widget.classList.remove('visible'); return; }

  widget.classList.add('visible');
  label.textContent = MOOD_CONFIG[music.mood]?.label ?? '🎵 Playing';
  btn.textContent   = music.muted ? '🔇' : '🔊';
  if (music.muted) widget.classList.add('muted');
  else             widget.classList.remove('muted');
  dot.style.background = music.muted ? '#ccc' : '#1DB954';
}

function toggleMute() {
  music.muted = !music.muted;
  if (music.muted) Tone.Transport.stop();
  else             Tone.Transport.start();
  updateMusicUI();
}

// Initialize the app by randomizing personalities on page load
randomizePersonalities();
</script>
