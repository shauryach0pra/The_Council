<!DOCTYPE html>
<html lang="en">
<!-- THE COUNCIL - A web app that summons legendary personalities to answer questions -->
<head>
<!-- Meta tags for character encoding and responsive viewport -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Council </title>
<script>document.title = "The Council";</script>

<!-- Google Fonts import for comic book style typography -->
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Boogaloo&family=Permanent+Marker&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  /* CSS Custom Properties (Variables) - Define consistent color scheme and design tokens */
  :root {
    --yellow: #FFE600;
    --red: #FF3333;
    --blue: #2B7FFF;
    --green: #1DB954;
    --orange: #FF8C00;
    --purple: #9B30FF;
    --pink: #FF4FA0;
    --bg: #FFFDE8;
    --ink: #111111;
    --card-radius: 20px;
  }

  /* Global reset - Remove default margins and padding */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Main body styles - Comic book aesthetic with dotted background pattern */
  body {
    font-family: 'Comic Neue', 'Comic Sans MS', cursive;
    background-color: var(--bg);
    min-height: 100vh;
    position: relative;
  }

  /* Background pattern overlay - Creates comic book dot pattern effect */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(circle, rgba(0,0,0,0.18) 1.5px, transparent 1.5px),
      radial-gradient(circle, rgba(255,230,0,0.35) 2px, transparent 2px);
    background-size: 14px 14px, 28px 28px;
    background-position: 0 0, 7px 7px;
  }

  /* Main content wrapper - Centers content and provides spacing */
  .main-wrap {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
    overflow-x: hidden;
  }

  /* Header section styles */
  .header { text-align: center; margin-bottom: 1.8rem; }

  /* Header badge - Promotional banner at the top */
  .header-badge {
    display: inline-block;
    background: #D946EF;
    color: #111;
    font-family: 'Bangers', cursive;
    letter-spacing: 4px;
    font-size: 0.88rem;
    padding: 5px 22px;
    border-radius: 30px;
    border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    margin-bottom: 1rem;
  }

  /* Main title styling - Large comic book style heading with shadow effects */
  h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(5rem, 15vw, 9.5rem);
    letter-spacing: 10px;
    line-height: 0.88;
    color: #fff;
    -webkit-text-stroke: 4px var(--ink);
    paint-order: stroke fill;
    filter: drop-shadow(10px 10px 0 var(--ink)) drop-shadow(-2px -2px 0 var(--ink));
    margin-bottom: 0.6rem;
    position: relative;
    display: inline-block;
  }

  /* Title wrapper container for positioning the starburst background */
  .title-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 0.5rem;
  }
  /* Starburst background animation - Rotating polygon behind the title */
  .starburst {
    position: absolute;
    inset: -18px;
    background: #0047AB;
    clip-path: polygon(50% 0%,61% 30%,93% 11%,78% 38%,100% 50%,78% 62%,93% 89%,61% 70%,50% 100%,39% 70%,7% 89%,22% 62%,0% 50%,22% 38%,7% 11%,39% 30%);
    z-index: -1;
    animation: starSpin 20s linear infinite;
  }
  /* Keyframe animation for continuous starburst rotation */
  @keyframes starSpin { to { transform: rotate(360deg); } }

  /* Subtitle text - Descriptive text below the main title */
  .header-sub {
    font-family: 'Boogaloo', cursive;
    font-size: 1.25rem;
    color: var(--ink);
    opacity: 0.7;
    margin-top: 1rem;
    letter-spacing: 0.5px;
  }

  /* Question input section - Yellow background container for user input */
  .question-section {
    background: #FFEB3B;
    border: 4px solid var(--ink);
    border-radius: 22px;
    box-shadow: 9px 9px 0 var(--ink);
    padding: 1.8rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  /* Question label text - "Your Question / Opinion :" heading */
  .question-label {
    font-family: 'Bangers', cursive;
    font-size: 1.7rem;
    letter-spacing: 2px;
    margin-bottom: 0.9rem;
    -webkit-text-stroke: 1px var(--ink);
  }
  /* Question textarea input field */
  .question-textarea {
    width: 100%;
    min-height: 90px;
    padding: 0.9rem 1.1rem;
    border: 3px solid var(--ink);
    border-radius: 14px;
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    resize: vertical;
    background: #fff;
    outline: none;
    transition: box-shadow 0.15s;
    line-height: 1.6;
    color: var(--ink);
  }
  /* Focus state for textarea - Adds shadow when user clicks on it */
  .question-textarea:focus { box-shadow: 5px 5px 0 var(--ink); }
  /* Placeholder text styling */
  .question-textarea::placeholder { color: #bbb; font-family: 'Boogaloo', cursive; }

  /* Personality chips container - Shows selected legendary personalities */
  .personalities-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  /* Individual personality chip styling */
  .personality-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #fff;
    border: 2.5px solid var(--ink);
    border-radius: 30px;
    padding: 4px 14px;
    font-family: 'Boogaloo', cursive;
    font-size: 0.9rem;
    box-shadow: 2px 2px 0 var(--ink);
  }

  /* Button row container - Holds the main action buttons */
  .btn-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    align-items: center;
  }
  /* Base button styling - Comic book style with shadow effects */
  .btn {
    font-family: 'Bangers', cursive;
    letter-spacing: 2.5px;
    padding: 0.75rem 1.8rem;
    border: 3.5px solid var(--ink);
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 6px 6px 0 var(--ink);
    text-transform: uppercase;
    outline: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  /* Active state - Button appears pressed down when clicked */
  .btn:active:not(:disabled) { transform: translate(4px,4px); box-shadow: 2px 2px 0 var(--ink); }
  /* Main summon button - Red, large, prominent */
  .btn-summon { background: #FF2222; color: #111; font-size: 1.5rem; flex: 1; min-width: 200px; justify-content: center; }
  .btn-summon:hover:not(:disabled) { background: #cc0000; }
  /* Randomize button - Green, smaller */
  .btn-randomize { background: #00CC66; color: var(--ink); font-size: 1.15rem; }
  .btn-randomize:hover:not(:disabled) { background: #00aa55; }
  /* Disabled state - When API call is in progress */
  .btn:disabled { opacity: 0.42; cursor: not-allowed; }

  /* Error message box - Hidden by default, shown when validation fails */
  .error-box {
    display: none;
    background: #fff0f0;
    border: 3px solid var(--ink);
    border-radius: 14px;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    color: #a00;
    box-shadow: 4px 4px 0 var(--ink);
  }
  /* Show class - Makes error box visible */
  .error-box.show { display: block; }

  /* Loading animation container - Visible by default, animations controlled by state */
  .loading-wrap { text-align: center; padding: 0.5rem 2rem 3rem; opacity: 0.3; transition: opacity 0.3s; }
  .loading-wrap.animating { opacity: 1; }
  /* Loading title text - "SUMMONING..." with pulsing animation */
  .loading-title {
    font-family: 'Bangers', cursive;
    font-size: 2.5rem;
    letter-spacing: 4px;
    color: var(--red);
    -webkit-text-stroke: 1.5px var(--ind);
    animation: pulse 0.9s ease-in-out infinite alternate;
    margin-bottom: 0.3rem;
  }
  /* Loading subtitle text */
  .loading-sub { font-family: 'Boogaloo', cursive; color: #999; font-size: 1.05rem; margin-bottom: 1.8rem; }
  /* SVG animation container */
  .loader-stage { display: flex; justify-content: center; align-items: center; }
  /* SVG dimensions and overflow settings */
  .loader-svg { width: 260px; height: 130px; overflow: visible; }

  /* Orbital dots animation - Static by default, animated when active */
  .orbit-dot { transform-origin: 130px 65px; }
  .loading-wrap.animating .orbit-dot { animation: orbitSpin 1.8s linear infinite; }
  /* Staggered animation delays for each orbit dot */
  .orbit-dot:nth-child(1){ animation-delay: 0s; }
  .orbit-dot:nth-child(2){ animation-delay: -0.45s; }
  .orbit-dot:nth-child(3){ animation-delay: -0.9s; }
  .orbit-dot:nth-child(4){ animation-delay: -1.35s; }
  /* Keyframe animation for 360-degree rotation */
  @keyframes orbitSpin { to { transform: rotate(360deg); } }
  /* Center burst animation - Static by default, pulsing when active */
  .centre-burst { transform-origin: 130px 65px; }
  .loading-wrap.animating .centre-burst { animation: burstPulse 0.7s ease-in-out infinite alternate; }
  /* Keyframe for scaling animation */
  @keyframes burstPulse { from{transform:scale(0.88)} to{transform:scale(1.08)} }
  /* Lightning bolt animations - Static by default, zapping when active */
  .zap-left  { transform-origin: 50px 65px; }
  .zap-right { transform-origin: 210px 65px; }
  .loading-wrap.animating .zap-left  { animation: zapLeft  0.6s ease-in-out infinite alternate; }
  .loading-wrap.animating .zap-right { animation: zapRight 0.6s ease-in-out infinite alternate; }
  /* Keyframes for lightning bolt rotation and scaling */
  @keyframes zapLeft  { from{transform:rotate(-15deg) scale(0.9)} to{transform:rotate(15deg) scale(1.1)} }
  @keyframes zapRight { from{transform:rotate(15deg)  scale(0.9)} to{transform:rotate(-15deg) scale(1.1)} }
  /* Question mark bounce animation - Static by default, bouncing when active */
  .qmark { transform-origin: 130px 65px; }
  .loading-wrap.animating .qmark { animation: qBounce 0.5s ease-in-out infinite alternate; }
  /* Keyframe for vertical bouncing */
  @keyframes qBounce { from{transform:translateY(3px)} to{transform:translateY(-5px)} }

  /* Loading dots container - Animated dots below the SVG */
  .loading-dots { display: flex; justify-content: center; gap: 10px; margin-top: 1.2rem; }
  /* Individual loading dot styling - Static by default, bouncing when active */
  .loading-dots span {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2.5px solid var(--ink);
    display: inline-block;
  }
  .loading-wrap.animating .loading-dots span {
    animation: dotBounce 0.6s ease-in-out infinite alternate;
  }
  /* Color and delay variations for each dot */
  .loading-dots span:nth-child(1){ background:var(--red);    animation-delay:0s; }
  .loading-dots span:nth-child(2){ background:var(--blue);   animation-delay:0.2s; }
  .loading-dots span:nth-child(3){ background:var(--green);  animation-delay:0.4s; }
  .loading-dots span:nth-child(4){ background:var(--purple); animation-delay:0.6s; }
  /* Keyframe for dot bouncing animation */
  @keyframes dotBounce { from{transform:translateY(0) scale(1)} to{transform:translateY(-10px) scale(1.2)} }
  /* Keyframe for pulsing animation used by loading title */
  @keyframes pulse { from{opacity:0.4;transform:scale(0.96)} to{opacity:1;transform:scale(1.05)} }

  /* Council announcement strip - Blue banner that appears when results are ready */
  .council-strip {
    display: none;
    background: #2B7FFF;
    color: var(--ink);
    font-family: 'Bangers', cursive;
    font-size: 1.7rem;
    letter-spacing: 5px;
    text-align: center;
    padding: 0.7rem 1rem;
    border-radius: 14px;
    border: 4px solid var(--ink);
    margin-bottom: 1.5rem;
    box-shadow: 6px 6px 0 var(--ink);
  }
  /* Show class - Makes council strip visible */
  .council-strip.show { display: block; }

  /* Council grid layout - 2-column grid for member cards */
  .council-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.6rem;
  }
  /* Responsive design - Single column on mobile devices */
  @media (max-width: 580px) { .council-grid { grid-template-columns: 1fr; } }

  /* Individual member card styling - Comic book style with shadow */
  .member-card {
    background: #fff;
    border: 4px solid var(--ink);
    border-radius: var(--card-radius);
    overflow: hidden;
    box-shadow: 8px 8px 0 var(--ink);
    animation: cardPop 0.45s cubic-bezier(0.175,0.885,0.32,1.275) both;
    transition: transform 0.18s;
    min-width: 0;
  }
  /* Hover effect - Card lifts and slightly rotates */
  .member-card:hover { transform: translateY(-5px) rotate(0.6deg); }
  /* Card entrance animation - Bouncy appearance effect */
  @keyframes cardPop {
    from { opacity:0; transform:scale(0.3) rotate(-15deg); }
    to   { opacity:1; transform:scale(1) rotate(0deg); }
  }
  /* Staggered animation delays for sequential card appearance */
  .member-card:nth-child(1){animation-delay:0.05s}
  .member-card:nth-child(2){animation-delay:0.14s}
  .member-card:nth-child(3){animation-delay:0.23s}
  .member-card:nth-child(4){animation-delay:0.32s}

  /* Card header section - Contains avatar, name, and archetype */
  .card-header {
    padding: 1.1rem 1.2rem 0.9rem;
    border-bottom: 3px solid var(--ink);
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  /* Avatar emoji container - Circular background for personality emoji */
  .avatar-emoji {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 3.5px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    flex-shrink: 0;
    box-shadow: 3px 3px 0 var(--ink);
  }
  /* Member info container - Name and archetype text */
  .member-info { flex: 1; min-width: 0; }
  /* Member name styling */
  .member-name {
    font-family: 'Bangers', cursive;
    font-size: 1.35rem;
    letter-spacing: 1.5px;
    line-height: 1.1;
    -webkit-text-stroke: 0.5px var(--ink);
  }
  /* Member archetype/subtitle styling */
  .member-archetype {
    font-family: 'Boogaloo', cursive;
    font-size: 0.78rem;
    color: #666;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }
  /* Vibe badge - Small tag showing personality vibe */
  .vibe-badge {
    font-family: 'Boogaloo', cursive;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 2.5px solid var(--ink);
    white-space: nowrap;
    align-self: flex-start;
    flex-shrink: 0;
    margin-top: 2px;
    box-shadow: 2px 2px 0 var(--ink);
  }

  /* Speech bubble container - Holds the personality's response */
  .speech-area { padding: 0.85rem 0.9rem 1rem; }
  /* Speech bubble styling - Comic book style with tail pointer */
  .speech-bubble {
    position: relative;
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 0.8rem 0.9rem;
    font-family: 'Comic Neue', cursive;
    font-size: 0.93rem;
    font-weight: 700;
    line-height: 1.55;
    color: var(--ink);
    background: #fffbf0;
    overflow-wrap: break-word;
  }
  /* Speech bubble tail - Left-pointing triangle using CSS borders */
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: 18px; left: -15px;
    width: 0; height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 15px solid var(--ink);
  }
  /* Inner tail - Creates the speech bubble effect with lighter color */
  .speech-bubble::after {
    content: '';
    position: absolute;
    top: 19px; left: -11px;
    width: 0; height: 0;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    border-right: 12px solid #fffbf0;
  }

  /* Theme color variations - Different background colors for each card */
  .theme-0 .card-header { background: #fff0f0; }
  .theme-0 .avatar-emoji { background: #ffd0d0; }
  .theme-0 .vibe-badge   { background: #ffd0d0; }
  .theme-1 .card-header { background: #f0f0ff; }
  .theme-1 .avatar-emoji { background: #d0d0ff; }
  .theme-1 .vibe-badge   { background: #d0d0ff; }
  .theme-2 .card-header { background: #f0fff5; }
  .theme-2 .avatar-emoji { background: #b8f0cc; }
  .theme-2 .vibe-badge   { background: #b8f0cc; }
  .theme-3 .card-header { background: #fffae0; }
  .theme-3 .avatar-emoji { background: #ffe080; }
  .theme-3 .vibe-badge   { background: #ffe080; }

  /* Empty state styling - Shows when no council members are displayed */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: #ccc; }
  /* Empty state emoji styling */
  .empty-emoji { font-size: 5rem; display: block; margin-bottom: 1rem; }
  /* Empty state text styling */
  .empty-text { font-family: 'Bangers', cursive; font-size: 1.7rem; letter-spacing: 2px; }
  /* Empty state subtitle styling */
  .empty-sub { font-family: 'Boogaloo', cursive; font-size: 1.05rem; margin-top: 0.4rem; color: #ddd; }

  /* Footer styling - Bottom section of the page */
  .footer { text-align: center; margin-top: 3rem; font-family: 'Boogaloo', cursive; font-size: 0.9rem; color: #bbb; }

  /* ── Unified Right Side Panel (Vibe + Music) ── */
  .side-panel {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%) translateX(calc(100% - 36px));
    z-index: 999;
    background: #ffffff;
    border: 2px solid #111;
    border-right: none;
    border-radius: 16px 0 0 16px;
    box-shadow: 6px 6px 0 #111;
    width: 230px;
    pointer-events: all;
    transition: transform 0.38s cubic-bezier(0.34, 1.1, 0.64, 1);
    cursor: pointer;
  }
  .side-panel.revealed {
    transform: translateY(-50%) translateX(0);
    cursor: default;
  }

  /* Tab handle — the visible peek strip on the left edge */
  .side-panel-tab {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    border-right: 2px solid #111;
    border-radius: 14px 0 0 14px;
    pointer-events: none;
  }
  .side-panel-tab-arrow {
    font-size: 0.65rem;
    color: #111;
    opacity: 1;
  }

  /* Vibe section — left padding accounts for the 36px tab strip */
  .sp-vibe { padding: 1rem 1.1rem 0.85rem 1.2rem; margin-left: 36px; }
  .sp-section-label {
    font-family: 'Bangers', cursive;
    font-size: 0.66rem;
    letter-spacing: 3px;
    color: #aaa;
    margin-bottom: 0.45rem;
    text-transform: uppercase;
  }
  .sp-vibe-display {
    font-family: 'Boogaloo', cursive;
    font-size: 0.95rem;
    color: #111;
    margin-bottom: 0.65rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sp-vibe-pip {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #111;
    flex-shrink: 0;
    transition: background 0.25s;
  }

  /* Range slider — clean black & white */
  .sp-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 3px;
    border: none;
    outline: none;
    cursor: pointer;
    background: linear-gradient(to right, #111 0%, #e2e2e2 0%);
    transition: background 0.2s;
    display: block;
    margin-bottom: 7px;
  }
  .sp-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 17px; height: 17px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #111;
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 1px 5px rgba(0,0,0,0.18);
  }
  .sp-slider::-webkit-slider-thumb:hover { transform: scale(1.25); }
  .sp-slider::-moz-range-thumb {
    width: 17px; height: 17px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid #111;
    cursor: pointer;
  }

  /* Emoji tick row */
  .sp-emojis {
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
    font-size: 0.88rem;
    line-height: 1;
    margin-bottom: 2px;
  }
  .sp-emojis span { width: 20%; text-align: center; }

  /* Text label row */
  .sp-tick-labels {
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
  }
  .sp-tick-labels span {
    font-family: 'Boogaloo', cursive;
    font-size: 0.5rem;
    color: #aaa;
    width: 20%;
    text-align: center;
    line-height: 1.2;
  }

  /* Thin divider between sections */
  .sp-divider {
    height: 1px;
    background: #ebebeb;
    margin: 0 1.1rem 0 calc(36px + 1.1rem);
    display: none;
  }
  .sp-divider.visible { display: block; }

  /* Music section */
  .sp-music {
    padding: 0.7rem 1.1rem 0.8rem calc(36px + 1.1rem);
    display: none;
  }
  .sp-music.active { display: block; }
  .sp-music-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .sp-music-label {
    font-family: 'Boogaloo', cursive;
    font-size: 0.8rem;
    color: #111;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sp-mute-btn {
    background: none;
    border: 1.5px solid #111;
    border-radius: 50%;
    width: 23px; height: 23px;
    cursor: pointer;
    font-size: 0.68rem;
    display: flex; align-items: center; justify-content: center;
    padding: 0; flex-shrink: 0;
    transition: background 0.15s;
    line-height: 1;
  }
  .sp-mute-btn:hover { background: #f4f4f4; }
  .sp-mute-btn.muted { opacity: 0.45; }

  /* Re-summon pulse */
  @keyframes quirkPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .council-grid.quirk-updating { animation: quirkPulse 0.75s ease-in-out infinite; }
</style>
</head>
<body>
<!-- Main content wrapper -->
<div class="main-wrap">

  <!-- Header section with title and subtitle -->
  <div class="header">

// Main function to summon the council and get responses
// Validates input, shows loading, calls API, and renders results
async function summonCouncil() {
  // Get user's question from textarea
  const question = document.getElementById('questionInput').value.trim();
  const errorBox = document.getElementById('errorBox');
  errorBox.classList.remove('show');

  // Input validation
  if (!question) { showError('🎤 Please type your question or dilemma first!'); return; }
  if (currentPersonalities.length === 0) { showError('🎲 Click Randomize to pick your legends!'); return; }

  // Show loading state and clear previous results
  setLoading(true);
  document.getElementById('councilStrip').classList.remove('show');
  document.getElementById('councilGrid').innerHTML = '';

  // 🔓 Unlock audio context immediately (must happen synchronously in click handler)
  await Tone.start();

  // 🎵 Fire HuggingFace emotion detection immediately (non-blocking)
  // Music starts ~500ms in, well before the 3-5s council response
  classifyMoodHF(question).then(mood => playMood(mood));

  try {
    // Make API call to the backend (fires in parallel with HF above)
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, personalities: currentPersonalities, quirk_level: currentQuirkLevel })
    });

    // Handle API errors
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Error ${res.status}`);
    }

    // Process successful response
    const data = await res.json();
    setLoading(false);
    renderCouncil(data.members);
    // Auto-scroll to bottom of page
    setTimeout(() => {
      window.scrollTo({ behavior: 'smooth', top: document.body.scrollHeight });
    }, 100);
  } catch (err) {
    // Handle network or API errors
    setLoading(false);
    showError('😬 ' + (err.message || 'Something went wrong. Try again!'));
  }
}

// Escape HTML to prevent XSS attacks
// Converts special characters to HTML entities
// Parameters: str (string) - text to escape
// Returns: Escaped HTML string
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const MOOD_CONFIG = {
  neutral:       { label: '🛋️ Lounge Mode',      bpm: 60  },
  anxious:       { label: '😱 DUN DUN DUN',        bpm: 112 },
  sad:           { label: '😭 Soap Opera Mode',    bpm: 46  },

};

const music = { mood: null, playing: false, muted: false, synths: [], parts: [], effects: [] };

// joy→circus, sadness→soap opera, anger→thriller, fear→thriller,
// disgust→chaos, surprise→epic reveal, neutral→lounge
// romantic + career triggered by keyword pre-check before HF call
const HF_TO_MOOD = {
  'joy':      'playful',
  'sadness':  'sad',
  'anger':    'anxious',
  'fear':     'anxious',
  'disgust':  'chaotic',
  'surprise': 'philosophical',
  'neutral':  'neutral',
};

async function classifyMoodHF(text) {
  // Keyword pre-check — catches romantic and career questions
  // before sending to HF, since the emotion model can't infer these
  const t = text.toLowerCase();
  if (/\b(love|crush|ex|relationship|dating|marry|marriage|breakup|girlfriend|boyfriend|date|flirt|romance|heartbreak|situationship|propose|proposal|divorce|cheat|cheating|feelings for|likes me|like him|like her)\b/.test(t)) return 'romantic';
  if (/\b(job|work|boss|salary|career|office|resign|quit|promotion|interview|fired|layoff|workplace|coworker|manager|hr|hire|startup|business|freelance|internship|appraisal|increment|hustle)\b/.test(t)) return 'career';

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emotion_text: text }),
    });
    const data = await res.json();
    return HF_TO_MOOD[data.emotion] ?? 'neutral';
  } catch (e) {
    return 'neutral';
  }
}

async function cleanupMusic() {
  Tone.Transport.stop();
  Tone.Transport.cancel();
  music.parts.forEach(p  => { try { p.stop(); p.dispose(); } catch(e){} });
  music.synths.forEach(s => { try { s.dispose(); } catch(e){} });
  music.effects.forEach(e => { try { e.dispose(); } catch(e){} });
  music.parts = []; music.synths = []; music.effects = [];
}

async function playMood(mood) {
  await cleanupMusic();
  await new Promise(r => setTimeout(r, 100));
  music.mood = mood;
  music.playing = true;
  Tone.Transport.bpm.value = MOOD_CONFIG[mood].bpm;
  const reverb = new Tone.Reverb({ decay: 4, wet: 0.45 }).toDestination();
  await reverb.ready;
  const delay = new Tone.FeedbackDelay('8n', 0.22).connect(reverb);
  music.effects.push(reverb, delay);
  const builders = { neutral, anxious, sad, romantic, playful, philosophical, career, chaotic };
  builders[mood](reverb, delay);
  if (!music.muted) Tone.Transport.start();
  updateMusicUI();
}

// ── NEUTRAL — gentle lounge jazz background ──────────────────────
// Pleasant Cmaj7 chords with a light walking melody. Sets a relaxed,
// slightly sophisticated backdrop that doesn't compete with the cards.
function neutral(reverb) {
  const pad = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 1.5, decay: 0.8, sustain: 0.6, release: 3 },
    volume: -22,
  }).connect(reverb);
  music.synths.push(pad);
  const chords = [
    { time:'0:0',  notes:['C3','E3','G3','B3'] },
    { time:'4:0',  notes:['A2','C3','E3','G3'] },
    { time:'8:0',  notes:['F2','A2','C3','E3'] },
    { time:'12:0', notes:['G2','B2','D3','F3'] },
  ];
  const part = new Tone.Part((t, v) => pad.triggerAttackRelease(v.notes, '3m', t), chords);
  part.loop = true; part.loopEnd = '16m'; part.start(0);
  music.parts.push(part);

  const mel = new Tone.Synth({
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.2, decay: 0.3, sustain: 0.5, release: 1.2 },
    volume: -30,
  }).connect(reverb);
  music.synths.push(mel);
  const melNotes = [
    {time:'0:0',n:'E4'},{time:'1:2',n:'G4'},{time:'3:0',n:'B4'},
    {time:'4:0',n:'C5'},{time:'5:2',n:'A4'},{time:'7:0',n:'G4'},
    {time:'8:0',n:'A4'},{time:'9:2',n:'C5'},{time:'11:0',n:'E5'},
    {time:'12:0',n:'D5'},{time:'13:2',n:'B4'},{time:'15:0',n:'G4'},
  ];
  const melPart = new Tone.Part((t, v) => mel.triggerAttackRelease(v.n, '2n', t), melNotes);
  melPart.loop = true; melPart.loopEnd = '16m'; melPart.start(0);
  music.parts.push(melPart);
}

    {time:'13:0',n:'F4'},{time:'14:0',n:'G4'},{time:'15:0',n:'E4'},
  ];
  const melPart = new Tone.Part((t, v) => mel.triggerAttackRelease(v.n, '1n', t), melNotes);
  melPart.loop = true; melPart.loopEnd = '16m'; melPart.start(0);
  music.parts.push(melPart);
}

// ── PLAYFUL — full circus music ─────────────────────────────────
// Fast, bouncy, gloriously ridiculous. Square-wave melody leaping
// all over the place + an oom-pah bass that never stops.
function playful(reverb) {
  const mel = new Tone.Synth({
    oscillator: { type: 'square' },
    envelope: { attack: 0.01, decay: 0.1, sustain: 0.5, release: 0.2 },
    volume: -20,
  }).connect(reverb);
  music.synths.push(mel);
  const circusNotes = [
    'C5','E5','G5','C6','B5','G5','E5',
    'F5','A5','C6','F6','E6','C6','A5',
    'G5','B5','D6','G6','F6','D6','B5',
    'C5','E5','G5','C6','E6','G6','C7',
  ];
  let ci = 0;
  const melLoop = new Tone.Loop(t => {
    mel.triggerAttackRelease(circusNotes[ci % circusNotes.length], '8n', t);
    ci++;
  }, '4n');
  melLoop.start(0);
  music.parts.push(melLoop);

  // Oom-pah bass
  const bass = new Tone.Synth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.04, decay: 0.15, sustain: 0.2, release: 0.3 },
    volume: -22,
  }).connect(reverb);
  music.synths.push(bass);
  const bassNotes = ['C2','G2','C2','G2','F2','C3','F2','C3','G2','D3','G2','D3','C2','G2','C2','G2'];
  let bi = 0;
  const bassLoop = new Tone.Loop(t => {
    bass.triggerAttackRelease(bassNotes[bi % bassNotes.length], '4n', t);
    bi++;
  }, '4n');
  bassLoop.start(0);
  music.parts.push(bassLoop);
}

// ── PHILOSOPHICAL — "EPIC REVEAL" fanfare ───────────────────────
// 2001: A Space Odyssey meets a game show. Massive slow chords that
// make every mundane question feel like humanity's greatest discovery.
function philosophical(reverb) {
  const grand = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 2.5, decay: 2, sustain: 0.9, release: 8 },
    volume: -18,
  }).connect(reverb);
  music.synths.push(grand);
  const chords = [
    { time:'0:0',  notes:['C1','C2','G2','C3','E3','G3'] },
    { time:'8:0',  notes:['F1','F2','C3','F3','A3','C4'] },
    { time:'16:0', notes:['G1','G2','D3','G3','B3','D4'] },
    { time:'24:0', notes:['C1','C2','G2','C3','G3','C4'] },
  ];
  const chordPart = new Tone.Part((t, v) => grand.triggerAttackRelease(v.notes, '7m', t), chords);
  chordPart.loop = true; chordPart.loopEnd = '32m'; chordPart.start(0);
  music.parts.push(chordPart);

  // Trumpet-like fanfare
  const fanfare = new Tone.Synth({
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.08, decay: 0.4, sustain: 0.6, release: 2 },
    volume: -24,
  }).connect(reverb);
  music.synths.push(fanfare);
  const fanNotes = [
    {time:'4:0',n:'C4'},{time:'4:2',n:'E4'},{time:'5:0',n:'G4'},
    {time:'6:0',n:'C5'},{time:'7:0',n:'G4'},{time:'7:2',n:'E4'},
    {time:'20:0',n:'F4'},{time:'20:2',n:'A4'},{time:'21:0',n:'C5'},
    {time:'22:0',n:'F5'},{time:'23:0',n:'C5'},
  ];
  const fanPart = new Tone.Part((t, v) => fanfare.triggerAttackRelease(v.n, '2n', t), fanNotes);
  fanPart.loop = true; fanPart.loopEnd = '32m'; fanPart.start(0);
  music.parts.push(fanPart);
}

// ── CAREER — ironic elevator / hold music ───────────────────────
// Smooth, toothless, aggressively corporate. The musical equivalent
// of "your call is very important to us." Safe major key, never risks
// anything. Slightly too cheerful in a hollow way.
function career(reverb) {
  const mel = new Tone.Synth({
    oscillator: { type: 'sine' },
    envelope: { attack: 0.2, decay: 0.3, sustain: 0.6, release: 1.2 },
    volume: -20,
  }).connect(reverb);
  music.synths.push(mel);
  const elevatorNotes = [
    {time:'0:0',n:'C4'},{time:'0:2',n:'E4'},{time:'1:0',n:'G4'},
    {time:'1:2',n:'E4'},{time:'2:0',n:'D4'},{time:'2:2',n:'F4'},
    {time:'3:0',n:'A4'},{time:'3:2',n:'G4'},{time:'4:0',n:'E4'},
    {time:'4:2',n:'C4'},{time:'5:0',n:'F4'},{time:'5:2',n:'A4'},
    {time:'6:0',n:'G4'},{time:'7:0',n:'E4'},{time:'7:2',n:'D4'},
  ];
  const melPart = new Tone.Part((t, v) => mel.triggerAttackRelease(v.n, '4n', t), elevatorNotes);
  melPart.loop = true; melPart.loopEnd = '8m'; melPart.start(0);
  music.parts.push(melPart);

  const chords = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 0.5, decay: 0.5, sustain: 0.5, release: 1.5 },
    volume: -28,
  }).connect(reverb);
  music.synths.push(chords);
  const chordPart = new Tone.Part((t, v) => chords.triggerAttackRelease(v.notes, '1m', t), [
    { time:'0:0', notes:['C3','E3','G3'] },
    { time:'2:0', notes:['D3','F3','A3'] },
    { time:'4:0', notes:['F3','A3','C4'] },
    { time:'6:0', notes:['G3','B3','D4'] },
  ]);
  chordPart.loop = true; chordPart.loopEnd = '8m'; chordPart.start(0);
  music.parts.push(chordPart);
}

// ── CHAOTIC — cartoon Looney Tunes energy ───────────────────────
// Fast, absurd, wildly jumping between registers. Like a cartoon
// character running off a cliff and looking at the camera first.
// Tuba-style low comedy bass underneath for maximum ridiculousness.
function chaotic(reverb, delay) {
  const zany = new Tone.Synth({
    oscillator: { type: 'square' },
    envelope: { attack: 0.005, decay: 0.1, sustain: 0.1, release: 0.15 },
    volume: -20,
  }).connect(delay);
  music.synths.push(zany);
  // Wild jumps across 4 octaves
  const zanotes = [
    'C6','G3','E5','Bb2','F6','D4','Ab5','C3',
    'B5','Eb4','A2','F5','C4','G6','E3','Bb5',
    'D6','Ab3','B4','F3','C5','G4','Eb6','A3',
  ];
  let zi = 0;
  const zanLoop = new Tone.Loop(t => {
    zany.triggerAttackRelease(zanotes[zi % zanotes.length], '32n', t);
    zi++;
  }, '8n');
  zanLoop.start(0);
  music.parts.push(zanLoop);

  // Comedy tuba bass
  const tuba = new Tone.Synth({
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.06, decay: 0.25, sustain: 0.3, release: 0.5 },
    volume: -22,
  }).connect(reverb);
  music.synths.push(tuba);
  const tubaNotes = [
    {time:'0:0',n:'C2'},{time:'0:2',n:'Bb1'},
    {time:'1:0',n:'Ab1'},{time:'1:2',n:'G1'},
    {time:'2:0',n:'F1'},{time:'2:1',n:'F2'},
    {time:'2:3',n:'E1'},{time:'3:0',n:'C2'},
  ];
  const tubaPart = new Tone.Part((t, v) => tuba.triggerAttackRelease(v.n, '8n', t), tubaNotes);
  tubaPart.loop = true; tubaPart.loopEnd = '4m'; tubaPart.start(0);
  music.parts.push(tubaPart);
}

// ── UI helpers ───────────────────────────────────────────────────
function updateMusicUI() {
  const musicSection = document.getElementById('spMusic');
  const divider      = document.getElementById('spDivider');
  const label        = document.getElementById('musicLabel');
  const btn          = document.getElementById('musicMuteBtn');
  if (!music.playing) {
    musicSection.classList.remove('active');
    divider.classList.remove('visible');
    return;
  }
  musicSection.classList.add('active');
  divider.classList.add('visible');
  label.textContent = MOOD_CONFIG[music.mood]?.label ?? '🎵 Playing';
  btn.textContent   = music.muted ? '🔇' : '🔊';
  btn.classList.toggle('muted', music.muted);
}

function toggleMute() {
  music.muted = !music.muted;
  Tone.Destination.mute = music.muted;
  updateMusicUI();
}

// ── Right-edge reveal for side panel ─────────────────────────────
// Panel slides in when mouse nears right edge (within 70px). Always
// revealable — not gated behind music state.
const _sidePanel = document.getElementById('sidePanel');
let _hideTimer = null;

function _revealPanel() {
  clearTimeout(_hideTimer);
  _hideTimer = null;
  _sidePanel.classList.add('revealed');
}

function _scheduleHide() {
  if (_hideTimer !== null) return;
  _hideTimer = setTimeout(() => {
    _hideTimer = null;
    _sidePanel.classList.remove('revealed');
  }, 600);
}

document.addEventListener('mousemove', e => {
  if (e.clientX >= window.innerWidth - 70) {
    _revealPanel();
  } else if (!_sidePanel.matches(':hover')) {
    _scheduleHide();
  }
});
_sidePanel.addEventListener('mouseenter', _revealPanel);
_sidePanel.addEventListener('mouseleave', _scheduleHide);

// Initialize the app by randomizing personalities on page load
randomizePersonalities();

// ================================================================
//  ⚡ VIBE LEVEL
// ================================================================

const QUIRK_LEVELS = [
  { emoji: '😁',   name: 'Sane',     pct: '0%'   },
  { emoji: '😝',   name: 'Quirky',   pct: '25%'  },
  { emoji: '🥵',   name: 'Weird',    pct: '50%'  },
  { emoji: '😈',   name: 'Unhinged', pct: '75%'  },
  { emoji: '💅🏻', name: 'Gay',      pct: '100%' },
];

let currentQuirkLevel  = 1;   // 1–5, default: Sane
let quirkReSummonTimer = null;

function onQuirkChange(val) {
  currentQuirkLevel = parseInt(val);
  const lvl = QUIRK_LEVELS[currentQuirkLevel - 1];

  // Update display text
  document.getElementById('quirkDisplay').textContent = `${lvl.emoji} ${lvl.name}`;

  // Update slider track fill (black progress)
  document.getElementById('quirkSlider').style.background =
    `linear-gradient(to right, #111 ${lvl.pct}, #e2e2e2 ${lvl.pct})`;

  // Auto re-summon if results already showing
  const hasResults  = document.getElementById('councilStrip').classList.contains('show');
  const hasQuestion = document.getElementById('questionInput').value.trim();
  if (hasResults && hasQuestion) {
    clearTimeout(quirkReSummonTimer);
    document.getElementById('councilGrid').classList.add('quirk-updating');
    quirkReSummonTimer = setTimeout(() => {
      document.getElementById('councilGrid').classList.remove('quirk-updating');
      summonCouncil();
    }, 900);
  }
}

// Init slider appearance on load
(function initQuirkSlider() {
  const lvl = QUIRK_LEVELS[currentQuirkLevel - 1];
  document.getElementById('quirkSlider').style.background =
    `linear-gradient(to right, #111 ${lvl.pct}, #e2e2e2 ${lvl.pct})`;
  document.getElementById('quirkDisplay').textContent = `${lvl.emoji} ${lvl.name}`;
})();
</script>
